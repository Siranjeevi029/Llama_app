name: chat

control-plane:
  port: 8000

default-service: workflow

services:
  workflow:
    name: Workflow
    source:
      type: local
      name: src
    path: src.workflow:workflow
    python-dependencies:
      - llama-index-core==0.12.52.post1
      - llama-index-workflows==1.3.0
      - llama-index-llms-groq>=0.3.0,<0.3.8
      - llama-index-embeddings-gemini>=0.3.0,<0.4.0
      - llama-index-indices-managed-llama-cloud>=0.6.3,<0.7.0
